<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enigma I</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="app">
  <header class="topbar">
    <div>
      <h1>Enigma I</h1>
      <p>Drei Rotoren, Umkehrwalze, ohne Steckerbrett</p>
    </div>

    <div class="status">
      <div><span>Rotor I</span><strong id="leftState">A</strong></div>
      <div><span>Rotor II</span><strong id="middleState">A</strong></div>
      <div><span>Rotor III</span><strong id="rightState">A</strong></div>
      <div><span>Schritt</span><strong id="stepState">bereit</strong></div>
    </div>
  </header>

  <section class="machine">
    <svg id="enigmaSvg" viewBox="0 0 1800 640" aria-label="Enigma I Maschine"></svg>
  </section>

  <section class="controls">
    <section class="box text-box">
      <label for="plainText">Klartext</label>
      <textarea id="plainText" spellcheck="false" placeholder="Text eingeben..."></textarea>
    </section>

    <section class="box text-box">
      <label for="cipherText">Geheimtext</label>
      <textarea id="cipherText" spellcheck="false" placeholder="Hier erscheint der Geheimtext..."></textarea>
    </section>

    <section class="box">
      <h2>Startcode</h2>
      <div class="startcode">
        <div>
          <label for="leftRotorStart">Rotor I</label>
          <select id="leftRotorStart"></select>
        </div>
        <div>
          <label for="middleRotorStart">Rotor II</label>
          <select id="middleRotorStart"></select>
        </div>
        <div>
          <label for="rightRotorStart">Rotor III</label>
          <select id="rightRotorStart"></select>
        </div>
      </div>
    </section>

    <section class="box">
      <h2>Modus</h2>
      <div class="mode-row">
        <button id="encryptBtn" class="mode active">🔒 Verschlüsseln</button>
        <button id="decryptBtn" class="mode">🔓 Entschlüsseln</button>
      </div>
    </section>

    <section class="box">
      <h2>Geschwindigkeit: <span id="speedLabel">3</span> Zeichen pro Sekunde</h2>
      <input id="speedRange" type="range" min="0.5" max="10" value="3" step="0.5">
      <div class="range-labels">
        <span>langsam</span>
        <span>schnell</span>
      </div>
    </section>

    <section class="box action-box">
      <button id="startBtn">▶ Start</button>
      <button id="stepBtn" class="secondary">▶ Einzelschritt</button>
      <button id="resetBtn" class="secondary">↻ Zurücksetzen</button>
    </section>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
